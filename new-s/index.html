<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>زر أحمر - تشغيل صوت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        /* الزر الأحمر الكبير - بدون أي نص */
        .red-button {
            background: #e31b23;
            border: none;
            outline: none;
            cursor: pointer;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.2);
            background-image: radial-gradient(circle at 30% 25%, rgba(255,255,240,0.2) 2%, transparent 2.5%);
            background-size: 25px 25px;
        }

        /* تأثير hover و active */
        .red-button:hover {
            background: #c01118;
            transform: scale(1.03);
            box-shadow: 0 25px 40px -8px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .red-button:active {
            transform: scale(0.96);
            background: #a80f16;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
            transition: 0.02s linear;
        }

        /* نبض خفيف عند النقر (تأثير بصري فقط) */
        @keyframes pulseRing {
            0% { box-shadow: 0 0 0 0 rgba(227, 27, 35, 0.6), 0 0 0 2px rgba(255,255,200,0.3); }
            70% { box-shadow: 0 0 0 20px rgba(227, 27, 35, 0), 0 0 0 5px rgba(255,255,200,0); }
            100% { box-shadow: 0 0 0 0 rgba(227, 27, 35, 0), 0 0 0 2px rgba(255,255,200,0.2); }
        }

        .play-pulse {
            animation: pulseRing 0.45s ease-out;
        }

        /* لا نصوص إطلاقاً - حتى الكود لا يضيف أي عناصر نصية مرئية */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
</head>
<body>
    <!-- زر أحمر خالص بدون أي نص مكتوب عليه أو بجانبه -->
    <button class="red-button" id="playSoundBtn" aria-label="تشغيل الصوت"></button>

    <!-- عنصر صوتي مخفي لتشغيل الملف -->
    <audio id="sahoorAudio" preload="auto" style="display: none;" src="sounds/sahoor.mp3"></audio>

    <script>
        (function() {
            const audio = document.getElementById('sahoorAudio');
            const btn = document.getElementById('playSoundBtn');

            // وظيفة تشغيل الصوت مع اعادة التعيين الى البداية
            function playSahoor() {
                try {
                    // إعادة الصوت إلى البداية إذا كان يمكن تحديد المدة
                    if (isFinite(audio.duration) && audio.duration > 0) {
                        audio.currentTime = 0;
                    } else {
                        audio.currentTime = 0;
                    }

                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch((error) => {
                            // عدم عرض أي نصوص للمستخدم، فقط تسجيل الخطأ في وحدة التحكم
                            console.warn("Audio playback failed:", error);
                            // محاولة بديلة: إعادة تحميل المصدر وتشغيله (بدون رسائل نصية)
                            if (error.name === "NotSupportedError" || error.name === "NotFoundError") {
                                console.warn("File issue: sounds/sahoor.mp3 may be missing or unsupported");
                                // لا نعرض أي تنبيهات للمستخدم
                            } else if (error.name === "NotAllowedError") {
                                // المتصفح يمنع التشغيل التلقائي، لكن الزر ينقر بواسطة المستخدم لذلك هذا نادر
                                console.warn("Autoplay blocked, but user gesture should handle it");
                            }
                        }).then(() => {
                            // نجاح التشغيل: إضافة تأثير نبض للزر دون نصوص
                            btn.classList.add('play-pulse');
                            setTimeout(() => {
                                btn.classList.remove('play-pulse');
                            }, 400);
                        });
                    } else {
                        // fallback للمتصفحات القديمة
                        audio.play();
                        btn.classList.add('play-pulse');
                        setTimeout(() => {
                            btn.classList.remove('play-pulse');
                        }, 400);
                    }
                } catch (err) {
                    console.error("Unexpected audio error:", err);
                }
            }

            // إضافة حدث النقر على الزر
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                playSahoor();
            });

            // تحسين: معالجة أخطاء تحميل الملف بصمت (عدم عرض نصوص للمستخدم)
            audio.addEventListener('error', (e) => {
                const mediaError = audio.error;
                if (mediaError) {
                    switch (mediaError.code) {
                        case MediaError.MEDIA_ERR_ABORTED:
                            console.warn("Audio loading aborted");
                            break;
                        case MediaError.MEDIA_ERR_NETWORK:
                            console.warn("Network error while loading audio");
                            break;
                        case MediaError.MEDIA_ERR_DECODE:
                            console.warn("Audio decode error, file may be corrupted");
                            break;
                        case MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED:
                            console.warn("File not found or format not supported: sounds/sahoor.mp3");
                            break;
                        default:
                            console.warn("Unknown audio error");
                    }
                } else {
                    console.warn("Failed to load audio from sounds/sahoor.mp3");
                }
            });

            // ضبط مستوى الصوت إذا لزم الأمر (تأكد من أنه مسموع)
            if (audio.volume === 0) audio.volume = 1;
        })();
    </script>
</body>
</html>
