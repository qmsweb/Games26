<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صالون مكياج باتريك الاحترافي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #baddf0; /* لون الخلفية الأزرق الفاتح */
            background-image: radial-gradient(#ffffff 10%, transparent 11%), radial-gradient(#ffffff 10%, transparent 11%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية التطبيق الرئيسية */
        #app-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            height: 95vh;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* الشريط الجانبي (الأدوات) */
        .sidebar {
            background: #f4f7f9;
            width: 300px;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: inset 0 0 15px rgba(255,255,255,1), 0 10px 20px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .tool-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-section h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .color-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            transform: scale(1.15);
            border-color: #666;
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        }

        .color-label {
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }

        /* الفرش */
        .brush-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 10px;
        }

        .brush-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }

        .brush-btn.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .brush-icon {
            background: #555;
            border-radius: 50px;
        }

        #brush-small .brush-icon { width: 8px; height: 30px; }
        #brush-medium .brush-icon { width: 16px; height: 40px; }
        #brush-large .brush-icon { width: 28px; height: 50px; }

        .eraser-btn {
            margin-top: 15px;
            background: #fff;
            border: 2px solid #ddd;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            color: #555;
            transition: all 0.2s;
        }

        .eraser-btn.active {
            background: #ffecb3;
            border-color: #ffc107;
            color: #d4a000;
        }

        /* منطقة الرسم الرئيسية */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* الإطار الدائري لتقييد الرسم */
        .canvas-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            background: #fff;
            border-radius: 50%; /* يجعل الإطار دائرياً كما في التصميم */
            box-shadow: 0 15px 40px rgba(0,0,0,0.15), inset 0 0 20px rgba(0,0,0,0.05);
            overflow: hidden; /* يمنع الرسم أو ظهور الصورة خارج الدائرة */
            border: 15px solid #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #base-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; /* يملأ الدائرة بالصورة */
            pointer-events: none;
            user-select: none;
        }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none; /* لمنع التمرير أثناء التلوين */
            z-index: 10;
        }

        /* الأزرار السفلية */
        .bottom-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 30px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-3px);
        }

        .btn-reset { background: #fff; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-save { background: #fff; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-start { background: #c2185b; color: #fff; box-shadow: 0 8px 20px rgba(194, 24, 91, 0.4); padding: 12px 40px; }

        /* شاشة البداية */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(186, 221, 240, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #start-overlay h1 {
            font-size: 4rem;
            color: #c2185b;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #fff;
        }

        /* دعم الشاشات الصغيرة */
        @media (max-width: 900px) {
            #app-container { flex-direction: column; height: auto; align-items: center; }
            .sidebar { width: 100%; max-height: 250px; flex-direction: row; flex-wrap: wrap; justify-content: center; overflow-y: auto;}
            .canvas-wrapper { width: 350px; height: 350px; }
            .bottom-controls { flex-wrap: wrap; justify-content: center; }
        }
        @media (max-width: 400px) {
            .canvas-wrapper { width: 280px; height: 280px; }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>صالون الجمال 🎨</h1>
        <button class="action-btn btn-start" onclick="startGame()">ابدأ اللعب</button>
    </div>

    <div id="app-container">
        
        <div class="sidebar">
            
            <div class="tool-section">
                <h3>ألوان الشفاه</h3>
                <div class="color-grid">
                    <div class="color-item">
                        <button class="color-btn active" style="background: #d32f2f;" data-color="rgba(211, 47, 47, 0.6)"></button>
                        <span class="color-label">أحمر كلاسيك</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #c2185b;" data-color="rgba(194, 24, 91, 0.6)"></button>
                        <span class="color-label">وردي توت</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #ffb74d;" data-color="rgba(255, 183, 77, 0.6)"></button>
                        <span class="color-label">خوخي</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #f57c00;" data-color="rgba(245, 124, 0, 0.6)"></button>
                        <span class="color-label">برتقالي</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #7b1fa2;" data-color="rgba(123, 31, 162, 0.6)"></button>
                        <span class="color-label">برقوقي</span>
                    </div>
                </div>
            </div>

            <hr style="width: 80%; border: 1px solid #e0e0e0; margin: 10px 0;">

            <div class="tool-section">
                <h3>العيون والخدود</h3>
                <div class="color-grid">
                    <div class="color-item">
                        <button class="color-btn" style="background: #f48fb1;" data-color="rgba(244, 143, 177, 0.3)"></button>
                        <span class="color-label">مورد خدود</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #81d4fa;" data-color="rgba(129, 212, 250, 0.4)"></button>
                        <span class="color-label">ظل أزرق</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #26a69a;" data-color="rgba(38, 166, 154, 0.4)"></button>
                        <span class="color-label">ظل أخضر</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #fcf4e3;" data-color="rgba(255, 255, 255, 0.5)"></button>
                        <span class="color-label">إضاءة لؤلؤ</span>
                    </div>
                    <div class="color-item">
                        <button class="color-btn" style="background: #ffd54f;" data-color="rgba(255, 213, 79, 0.4)"></button>
                        <span class="color-label">ظل ذهبي</span>
                    </div>
                </div>
            </div>

            <hr style="width: 80%; border: 1px solid #e0e0e0; margin: 10px 0;">

            <div class="tool-section">
                <h3>الفرش</h3>
                <div class="brush-grid">
                    <button class="brush-btn" id="brush-small" data-size="8">
                        <div class="brush-icon"></div>
                        <span class="color-label">صغيرة</span>
                    </button>
                    <button class="brush-btn active" id="brush-medium" data-size="20">
                        <div class="brush-icon"></div>
                        <span class="color-label">متوسطة</span>
                    </button>
                    <button class="brush-btn" id="brush-large" data-size="45">
                        <div class="brush-icon"></div>
                        <span class="color-label">كبيرة</span>
                    </button>
                </div>
                <button class="eraser-btn" id="btn-eraser">إسفنجة تنظيف 🧽</button>
            </div>

        </div>

        <div class="main-area">
            <div class="canvas-wrapper">
                <img id="base-img" src="image.WEBP" alt="Character">
                <canvas id="draw-canvas"></canvas>
            </div>

            <div class="bottom-controls">
                <button class="action-btn btn-reset" onclick="resetCanvas()">إعادة تعيين</button>
                <button class="action-btn btn-save" onclick="saveImage()">حفظ الصورة</button>
            </div>
        </div>

    </div>

    <script>
        // إخفاء شاشة البداية
        function startGame() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            initCanvas(); // تهيئة أبعاد اللوحة بعد ظهورها
        }

        // متغيرات الرسم
        const canvas = document.getElementById('draw-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const wrapper = document.querySelector('.canvas-wrapper');
        
        let isDrawing = false;
        let currentColor = 'rgba(211, 47, 47, 0.6)'; // اللون الافتراضي (أحمر الشفاه)
        let currentSize = 20; // الحجم الافتراضي (متوسط)
        let isEraser = false;

        // تهيئة أبعاد اللوحة لتطابق الحاوية الدائرية
        function initCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }

        window.addEventListener('resize', initCanvas);

        // --- التعامل مع الألوان ---
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                isEraser = false;
                document.getElementById('btn-eraser').classList.remove('active');
                
                colorBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.getAttribute('data-color');
            });
        });

        // --- التعامل مع أحجام الفرش ---
        const brushBtns = document.querySelectorAll('.brush-btn');
        brushBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                isEraser = false;
                document.getElementById('btn-eraser').classList.remove('active');

                brushBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSize = parseInt(btn.getAttribute('data-size'));
            });
        });

        // --- أداة المسح (الإسفنجة) ---
        const eraserBtn = document.getElementById('btn-eraser');
        eraserBtn.addEventListener('click', () => {
            isEraser = true;
            eraserBtn.classList.add('active');
            colorBtns.forEach(b => b.classList.remove('active'));
            // جعل حجم الممحاة كبير نسبياً لتسهيل التنظيف
            currentSize = 40; 
        });

        // --- وظائف الرسم الأساسية ---
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            // دعم الماوس واللمس
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startPosition(e) {
            isDrawing = true;
            draw(e);
        }

        function endPosition() {
            isDrawing = false;
            ctx.beginPath(); // قطع الخط لبدء خط جديد لاحقاً
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // منع تمرير الشاشة في الجوال

            const { x, y } = getCoordinates(e);

            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (isEraser) {
                // إعدادات الممحاة (تمسح اللون المضاف فقط ولا تؤثر على الصورة الخلفية)
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.shadowBlur = 0;
            } else {
                // إعدادات التلوين (المكياج)
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                
                // إضافة ضبابية (Blur) للحواف لتبدو كالمكياج
                ctx.shadowBlur = currentSize / 2;
                ctx.shadowColor = currentColor;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // مستمعات أحداث الماوس
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseleave', endPosition);

        // مستمعات أحداث اللمس (للأجهزة المحمولة)
        canvas.addEventListener('touchstart', startPosition, { passive: false });
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', draw, { passive: false });

        // --- أزرار التحكم السفلية ---
        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function saveImage() {
            // دمج الصورة الأساسية مع رسمة المكياج لحفظهما معاً
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            const baseImg = document.getElementById('base-img');
            
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            // رسم الخلفية (لتجنب الشفافية السوداء في بعض الأجهزة)
            tCtx.fillStyle = '#ffffff';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

            // رسم الصورة الأصلية
            tCtx.drawImage(baseImg, 0, 0, tempCanvas.width, tempCanvas.height);
            // رسم المكياج فوقها
            tCtx.drawImage(canvas, 0, 0);

            // تحميل الصورة
            const link = document.createElement('a');
            link.download = 'patrick-makeup.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
